name: Markdown Check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  markdown-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repository structure check
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f docs/roadmap.md
          test -f docs/decisions/ADR-0001-public-repository-scope.md
